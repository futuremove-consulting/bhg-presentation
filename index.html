<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BHG — Executive Intelligence Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <header class="site-header">
    <div class="header-inner">
      <a class="header-logo" href="https://www.futuremove.com.br/" target="_blank" rel="noopener" aria-label="FutureMove Consulting — abrir site">
        <img src="logo-light.svg" alt="FutureMove" class="logo-img">
      </a>
      <nav class="header-nav" role="tablist" aria-label="Seções da apresentação">
        <button class="tab-btn active" data-tab="contexto" id="tab-btn-contexto" role="tab" aria-selected="true" aria-controls="tab-contexto">CONTEXTO</button>
        <button class="tab-btn" data-tab="segmentos" id="tab-btn-segmentos" role="tab" aria-selected="false" aria-controls="tab-segmentos">SEGMENTOS</button>
        <button class="tab-btn" data-tab="posicionamento" id="tab-btn-posicionamento" role="tab" aria-selected="false" aria-controls="tab-posicionamento">POSICIONAMENTO</button>
        <button class="tab-btn" data-tab="diagnostico" id="tab-btn-diagnostico" role="tab" aria-selected="false" aria-controls="tab-diagnostico">DIAGNÓSTICO BHG</button>
        <button class="tab-btn" data-tab="tese" id="tab-btn-tese" role="tab" aria-selected="false" aria-controls="tab-tese">TESE</button>
        <button class="tab-btn" data-tab="modelos" id="tab-btn-modelos" role="tab" aria-selected="false" aria-controls="tab-modelos">CENÁRIOS DE MODELO</button>
        <button class="tab-btn" data-tab="conclusao" id="tab-btn-conclusao" role="tab" aria-selected="false" aria-controls="tab-conclusao">CONCLUSÃO</button>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div id="tab-contexto" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-contexto"></div>
    <div id="tab-segmentos" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-segmentos"></div>
    <div id="tab-posicionamento" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-posicionamento"></div>
    <div id="tab-diagnostico" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-diagnostico"></div>
    <div id="tab-tese" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-tese"></div>
    <div id="tab-modelos" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-modelos"></div>
    <div id="tab-conclusao" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-conclusao"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="logo-light.svg" alt="FutureMove" class="footer-logo">
      <div class="footer-accent" role="presentation"></div>
      <span class="footer-copy">(c) 2026 FutureMove Consulting. Todos os direitos reservados.</span>
    </div>
  </footer>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
